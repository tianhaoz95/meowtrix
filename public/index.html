<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meowtrix</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <div id="toolbar">
      <span id="logo">
        <span id="logo-icon">🐾</span>
        <span id="logo-text">Meow<span id="logo-trix">trix</span></span>
      </span>
      <div id="toolbar-actions">
        <button id="btn-split-v" title="Split vertical (side by side)">⬒ Split V</button>
        <button id="btn-split-h" title="Split horizontal (top/bottom)">⬓ Split H</button>
        <button id="btn-close-pane" title="Close active pane" class="btn-danger">✕ Close</button>
        <button id="btn-theme" title="Toggle light/dark theme">☀</button>
      </div>
    </div>
    <div id="workspace"></div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
  <script src="ws.js"></script>
  <script src="pane.js"></script>
  <script src="layout.js"></script>
  <script src="app.js"></script>
</body>
</html>
