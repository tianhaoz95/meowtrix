<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
  <title>Meowtrix</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <div id="toolbar">
      <span id="logo">
        <span id="logo-icon">🐾</span>
        <span id="logo-text">Meow<span id="logo-trix">trix</span></span>
      </span>
      <div id="toolbar-actions">
        <button id="btn-split-v" title="Split vertical (side by side)"><span class="btn-icon">◧</span><span class="btn-text">Split V</span></button>
        <button id="btn-split-h" title="Split horizontal (top/bottom)"><span class="btn-icon">⬓</span><span class="btn-text">Split H</span></button>
        <button id="btn-close-pane" title="Close active pane" class="btn-danger"><span class="btn-icon">✕</span><span class="btn-text">Close</span></button>
        <button id="btn-broadcast" title="Broadcast input to all visible terminals" aria-pressed="false"><span class="btn-icon">📡</span><span class="btn-text">Broadcast</span></button>
        <button id="btn-upload" title="Upload file(s) to the host (~/meowtrix)"><span class="btn-icon">📤</span><span class="btn-text">Upload</span></button>
        <input type="file" id="upload-input" multiple hidden>
        <button id="btn-schedule" title="Schedule an Enter key press in the active terminal (for when your quota resets)"><span class="btn-icon">⏰</span><span class="btn-text">Schedule</span></button>
        <button id="btn-palette" aria-label="Command palette"><span class="btn-icon">⌘</span><span class="btn-text">Commands</span></button>
        <button id="btn-theme" title="Toggle light/dark theme">☀</button>
        <button id="btn-settings" title="Settings">⚙</button>
      </div>
    </div>
    <div id="workspace"></div>

    <!-- Inactive session overlay -->
    <div id="inactive-overlay" hidden>
      <div id="inactive-box">
        <div id="inactive-icon">🐾</div>
        <div id="inactive-title">Session active elsewhere</div>
        <div id="inactive-desc">Meowtrix is already open in another tab.</div>
        <button id="btn-takeover">Move session here</button>
      </div>
    </div>

    <!-- Settings panel -->
    <div id="settings-overlay"></div>
    <div id="settings-panel">
      <div id="settings-header">
        <span>Settings</span>
        <div style="display:flex;gap:6px;align-items:center">
          <button id="settings-reset" title="Reset to defaults">Reset</button>
          <button id="settings-close">✕</button>
        </div>
      </div>
      <div id="settings-body">
        <div class="settings-section">
          <div class="settings-section-title">Appearance</div>
          <div class="settings-row">
            <label for="s-theme">Theme</label>
            <select id="s-theme">
              <!-- options populated from THEMES (app.js) by settings.js -->
              <option value="dark">Midnight</option>
            </select>
          </div>
          <div class="settings-row">
            <label for="s-font-size">Terminal font size</label>
            <div class="settings-row-right">
              <input type="range" id="s-font-size" min="10" max="20" step="1">
              <span id="s-font-size-val"></span>
            </div>
          </div>
          <div class="settings-row">
            <label for="s-font-family">Terminal font</label>
            <select id="s-font-family">
              <option value="Cascadia Code, monospace">Cascadia Code</option>
              <option value="JetBrains Mono, monospace">JetBrains Mono</option>
              <option value="Menlo, Monaco, monospace">Menlo / Monaco</option>
              <option value="monospace">System monospace</option>
            </select>
          </div>
          <div class="settings-row">
            <label for="s-combo-fx">Keystroke combo FX</label>
            <input type="checkbox" id="s-combo-fx">
          </div>
        </div>
        <div class="settings-section">
          <div class="settings-section-title">Terminal</div>
          <div class="settings-row">
            <label for="s-shell">Shell</label>
            <input type="text" id="s-shell" placeholder="/bin/zsh">
          </div>
          <div class="settings-row">
            <label for="s-scrollback">Scrollback lines</label>
            <select id="s-scrollback">
              <option value="1000">1,000</option>
              <option value="5000">5,000</option>
              <option value="10000">10,000</option>
              <option value="50000">50,000</option>
            </select>
          </div>
        </div>
        <div class="settings-section">
          <div class="settings-section-title">Companion</div>
          <div class="settings-row">
            <label for="s-pet">Chat pet</label>
            <input type="checkbox" id="s-pet">
          </div>
          <div class="settings-row">
            <label for="s-pet-face">Pet look</label>
            <select id="s-pet-face">
              <!-- options populated from PET_FACES (pet.js) by settings.js -->
            </select>
          </div>
          <p class="settings-note" id="s-pet-note" hidden></p>
        </div>
        <div class="settings-section">
          <div class="settings-section-title">Browser</div>
          <div class="settings-row">
            <label for="s-homepage">Default homepage</label>
            <input type="text" id="s-homepage" placeholder="Blank = start page">
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
  <script src="demo.js"></script>
  <script src="ws.js"></script>
  <script src="pane.js"></script>
  <script src="layout.js"></script>
  <script src="app.js"></script>
  <script src="mobile.js"></script>
  <script src="settings.js"></script>
  <script src="palette.js"></script>
  <script src="schedule.js"></script>
  <script src="combo.js"></script>
  <script src="pet.js"></script>
</body>
</html>
