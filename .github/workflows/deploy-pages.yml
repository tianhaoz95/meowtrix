name: Deploy project site to GitHub Pages

# Deploys via GitHub Actions (Pages "source" must be set to GitHub Actions,
# not "deploy from a branch").
on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions required by actions/deploy-pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assemble site
        run: |
          set -euo pipefail
          mkdir -p _site
          # Landing page + documentation at the site root.
          cp -r website/. _site/
          # The live demo IS the app's public/ served statically (visited as /demo/?demo).
          mkdir -p _site/demo
          cp -r public/. _site/demo/
          # Disable Jekyll so nothing is filtered out.
          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
